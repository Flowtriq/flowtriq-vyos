<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="720" y2="280">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="720" height="280" rx="12" fill="url(#bg)"/>

  <!-- Mode labels -->
  <text x="360" y="25" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="10">TWO INTEGRATION PATHS</text>

  <!-- Mode 1: Direct Install -->
  <text x="50" y="55" fill="#00d4aa" font-family="monospace" font-size="9" font-weight="600">MODE 1: DIRECT INSTALL (RECOMMENDED)</text>
  <rect x="30" y="65" width="280" height="80" rx="10" fill="#1a1f2e" stroke="#00d4aa" stroke-width="1.5"/>
  <text x="170" y="90" text-anchor="middle" fill="#4ab8e8" font-family="system-ui" font-size="13" font-weight="600">VyOS Router</text>
  <text x="170" y="108" text-anchor="middle" fill="#00d4aa" font-family="monospace" font-size="10">ftagent (native, Debian-based)</text>
  <text x="170" y="125" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">Sub-second detection + PCAP</text>

  <line x1="315" y1="105" x2="395" y2="105" stroke="#4ab8e8" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="395,100 405,105 395,110" fill="#4ab8e8"/>
  <text x="355" y="95" text-anchor="middle" fill="#4ab8e8" font-family="monospace" font-size="9">HTTPS</text>

  <!-- Mode 2: NetFlow -->
  <text x="50" y="175" fill="#f59e0b" font-family="monospace" font-size="9" font-weight="600">MODE 2: NETFLOW/SFLOW EXPORT</text>
  <rect x="30" y="185" width="180" height="70" rx="10" fill="#1a1f2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="120" y="210" text-anchor="middle" fill="#4ab8e8" font-family="system-ui" font-size="13" font-weight="600">VyOS Router</text>
  <text x="120" y="228" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="9">flow-accounting</text>
  <text x="120" y="243" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">Zero overhead</text>

  <line x1="215" y1="220" x2="275" y2="220" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="275,215 285,220 275,225" fill="#f59e0b"/>
  <text x="250" y="210" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="8">UDP :2055</text>

  <rect x="290" y="185" width="170" height="70" rx="10" fill="#1a1f2e" stroke="#30363d" stroke-width="1.5"/>
  <text x="375" y="215" text-anchor="middle" fill="#9ca3af" font-family="system-ui" font-size="12" font-weight="600">ftagent</text>
  <text x="375" y="233" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">Flow Collector</text>

  <line x1="465" y1="220" x2="520" y2="160" stroke="#4ab8e8" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Dashboard (shared) -->
  <rect x="410" y="65" width="280" height="120" rx="10" fill="#1a1f2e" stroke="#4ab8e8" stroke-width="1.5"/>
  <text x="550" y="95" text-anchor="middle" fill="#4ab8e8" font-family="system-ui" font-size="14" font-weight="600">Flowtriq Dashboard</text>
  <text x="550" y="115" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">Real-time attack detection</text>
  <text x="550" y="130" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">BGP FlowSpec / RTBH automation</text>
  <text x="550" y="145" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">Alerting + incident history</text>
  <text x="550" y="160" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">Per-IP traffic baselines</text>
</svg>
